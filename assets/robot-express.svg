<svg width="420" height="130" viewBox="0 0 420 130" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8E8E8"/><stop offset="100%" stop-color="#2C2C2C"/>
    </linearGradient>
    <linearGradient id="darkMetal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#444"/><stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <style>
      @keyframes walk { 0% { transform: translateX(-80px) translateY(25px); } 19%, 81% { transform: translateX(180px) translateY(25px); } 100% { transform: translateX(-80px) translateY(25px); } }
      @keyframes flip { 0%, 81% { transform: scaleX(1); } 87%, 100% { transform: scaleX(-1); } }
      @keyframes headFloat { 0%, 35%, 75%, 100% { transform: translateY(0) scaleX(1); } 40% { transform: translateY(-15px) scaleX(1); } 45% { transform: translateY(-15px) scaleX(-1); } 50% { transform: translateY(-15px) scaleX(1); } 55% { transform: translateY(-15px) scaleX(-1); } 60% { transform: translateY(-15px) scaleX(1); } 65% { transform: translateY(0) scaleX(1); } }
      @keyframes packageDrop { 0%, 75% { opacity: 0; transform: translateY(20px); } 80%, 100% { opacity: 1; transform: translateY(0); } }

      .robot-container { animation: walk 8s cubic-bezier(0.25, 1, 0.5, 1) infinite; }
      .robot-flip { animation: flip 8s ease-in-out infinite; transform-origin: 15px 0; }
      .express-head { animation: headFloat 8s ease-in-out infinite; transform-origin: 15px 13px; }
      .dropped-package { animation: packageDrop 8s infinite; transform-origin: 180px 85px; transform: translate(180px, 80px); }
    </style>
  </defs>

  <g class="dropped-package">
    <rect x="0" y="0" width="16" height="12" fill="#8A2BE2" stroke="#fff" stroke-width="1"/>
    <line x1="8" y1="0" x2="8" y2="12" stroke="#00ffff" stroke-width="1.5" />
    <text x="1" y="9" font-family="monospace" font-size="8" fill="#fff" opacity="0.9">PR</text>
  </g>

  <g class="robot-container">
    <g class="robot-flip">
        <rect x="5" y="65" width="6" height="18" rx="2" fill="url(#metal)"/>
        <rect x="19" y="65" width="6" height="18" rx="2" fill="url(#metal)"/>
        <rect x="0" y="25" width="30" height="45" rx="5" fill="url(#metal)" stroke="#2C2C2C"/>
        <rect x="5" y="40" width="20" height="14" rx="2" fill="url(#darkMetal)"/>
        
        <g class="express-head">
          <rect x="-6" y="0" width="42" height="26" rx="4" fill="url(#metal)" stroke="#2C2C2C"/>
          <rect x="-1" y="4" width="32" height="18" rx="2" fill="url(#darkMetal)"/>
          <circle cx="8" cy="11" r="3.5" fill="#00ffff" />
          <circle cx="22" cy="11" r="3.5" fill="#00ffff" />
          <!-- Magnetic energy rings when floating -->
          <ellipse cx="15" cy="28" rx="10" ry="2" fill="none" stroke="#00ffff" opacity="0.6"/>
        </g>
    </g>
  </g>
</svg>
