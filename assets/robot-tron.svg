<svg width="420" height="130" viewBox="0 0 420 130" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8E8E8"/><stop offset="20%" stop-color="#C0C0C0"/>
      <stop offset="80%" stop-color="#555555"/><stop offset="100%" stop-color="#2C2C2C"/>
    </linearGradient>
    <linearGradient id="darkMetal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#444"/><stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <filter id="neonCyan">
      <feGaussianBlur stdDeviation="2" result="blur" /><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes walk { 0% { transform: translateX(-80px) translateY(25px); } 19%, 81% { transform: translateX(180px) translateY(25px); } 100% { transform: translateX(-80px) translateY(25px); } }
      @keyframes bounce { 0%, 19%, 81%, 100% { transform: translateY(0); } 2%, 6%, 10%, 14%, 18%, 83%, 87%, 91%, 95%, 99% { transform: translateY(-5px); } 4%, 8%, 12%, 16%, 85%, 89%, 93%, 97% { transform: translateY(0); } }
      @keyframes flip { 0%, 81% { transform: scaleX(1); } 87%, 100% { transform: scaleX(-1); } }
      @keyframes bubblePop { 0%, 35% { opacity: 0; transform: scale(0.5); } 40%, 75% { opacity: 1; transform: scale(1); } 80%, 100% { opacity: 0; transform: scale(0.8); } }
      @keyframes eyesShift { 0%, 25% { transform: translateX(0); } 27%, 30% { transform: translateX(-3px); } 35%, 45% { transform: translateX(3px); } 47%, 100% { transform: translateX(0); } }
      @keyframes eyesBlink { 0%, 28%, 32%, 58%, 62%, 100% { transform: scaleY(1); } 30%, 60% { transform: scaleY(0.1); } }
      @keyframes wave { 0%, 35%, 75%, 100% { transform: rotate(0deg); } 40%, 50%, 60%, 70% { transform: rotate(-130deg); } 45%, 55%, 65% { transform: rotate(-90deg); } }
      @keyframes shadowPulse { 0%, 19%, 81%, 100% { transform: scale(1); opacity: 0.8; } 2%, 6%, 10%, 14%, 18%, 83%, 87%, 91%, 95%, 99% { transform: scale(0.8); opacity: 0.3; } }
      
      .robot-container { animation: walk 8s cubic-bezier(0.25, 1, 0.5, 1) infinite; }
      .robot-bounce { animation: bounce 8s linear infinite; }
      .robot-flip { animation: flip 8s ease-in-out infinite; transform-origin: 15px 0; }
      .speech-bubble { animation: bubblePop 8s cubic-bezier(0.175, 0.885, 0.32, 1.275) infinite; transform-origin: 15px 35px; }
      .eyes-group { animation: eyesShift 8s infinite; }
      .eye { animation: eyesBlink 8s infinite; transform-origin: center; }
      .arm-right { animation: wave 8s infinite; transform-origin: 29px 34px; }
      .shadow { animation: shadowPulse 8s linear infinite; transform-origin: center; }
      .bubble-text { fill: #ffffff; font-family: 'Inter', 'Segoe UI', sans-serif; font-size: 13px; font-weight: 600; }
    </style>
  </defs>

  <!-- Tron Grid -->
  <g stroke="#ff00ff" stroke-width="1.5" opacity="0.3">
    <line x1="0" y1="110" x2="420" y2="110"/>
    <line x1="0" y1="120" x2="420" y2="120"/>
    <line x1="0" y1="130" x2="420" y2="130"/>
    <path d="M60 130 L100 110 M110 130 L140 110 M160 130 L180 110 M210 130 L220 110 M260 130 L260 110 M310 130 L300 110 M360 130 L340 110 M410 130 L380 110" />
    <path d="M10 130 L60 110 M-40 130 L20 110" />
  </g>

  <!-- Bubble -->
  <g class="speech-bubble" style="transform: translate(175px, 20px);">
    <rect x="0" y="0" width="180" height="24" rx="12" fill="#1a0533" stroke="#00ffff" stroke-width="1.5" filter="url(#neonCyan)" opacity="0.3"/>
    <rect x="0" y="0" width="180" height="24" rx="12" fill="#1a0533" stroke="#ff00ff" stroke-width="1.5"/>
    <polygon points="15,22 10,35 25,22" fill="#1a0533" stroke="#ff00ff" stroke-width="1.5"/>
    <polygon points="16,21 11,33 24,21" fill="#1a0533" stroke="none" />
    <text x="12" y="16" class="bubble-text">psst... nice README! 👀</text>
  </g>

  <g class="robot-container">
    <ellipse cx="14" cy="88" rx="15" ry="3" fill="#000" class="shadow"/>
    <g class="robot-flip">
      <g class="robot-bounce">
        <!-- Robot Parts -->
        <rect x="14" y="-20" width="2" height="20" fill="#888"/>
        <circle cx="15" cy="-20" r="3" fill="#00ffff" filter="url(#neonCyan)"/>
        <rect x="-2" y="30" width="6" height="18" rx="3" fill="url(#metal)"/>
        <!-- Legs -->
        <rect x="5" y="65" width="6" height="18" rx="2" fill="url(#metal)"/>
        <rect x="19" y="65" width="6" height="18" rx="2" fill="url(#metal)"/>
        <path d="M 2 83 L 13 83 L 11 88 L 2 88 Z" fill="#2C2C2C"/>
        <path d="M 16 83 L 27 83 L 25 88 L 16 88 Z" fill="#2C2C2C"/>
        <!-- Body -->
        <rect x="0" y="25" width="30" height="45" rx="5" fill="url(#metal)" stroke="#2C2C2C" stroke-width="1"/>
        <line x1="2" y1="32" x2="28" y2="32" stroke="#888" stroke-width="1"/>
        <line x1="2" y1="63" x2="28" y2="63" stroke="#888" stroke-width="1"/>
        <!-- Chest Screen -->
        <rect x="5" y="40" width="20" height="14" rx="2" fill="url(#darkMetal)"/>
        <text x="7" y="50" font-family="'Courier New', monospace" font-size="8" fill="#ff00ff" filter="url(#neonCyan)">&lt;/&gt;</text>
        <text x="7" y="50" font-family="'Courier New', monospace" font-size="8" fill="#fff" opacity="0.8">&lt;/&gt;</text>
        <!-- Arm -->
        <g class="arm-right">
          <circle cx="29" cy="34" r="4" fill="#2C2C2C"/>
          <rect x="26" y="34" width="6" height="17" rx="2" fill="url(#metal)"/>
          <path d="M 23 51 L 35 51 L 32 56 L 25 56 Z" fill="#C0C0C0"/>
        </g>
        <!-- Head -->
        <rect x="-6" y="0" width="42" height="26" rx="4" fill="url(#metal)" stroke="#2C2C2C" stroke-width="1.5"/>
        <rect x="-1" y="4" width="32" height="18" rx="2" fill="url(#darkMetal)"/>
        <g class="eyes-group">
          <circle cx="8" cy="11" r="3.5" fill="#ff00ff" class="eye" filter="url(#neonCyan)"/>
          <circle cx="22" cy="11" r="3.5" fill="#ff00ff" class="eye" filter="url(#neonCyan)"/>
        </g>
        <rect x="9" y="18" width="12" height="1.5" fill="#ff00ff" filter="url(#neonCyan)"/>
      </g>
    </g>
  </g>
</svg>
